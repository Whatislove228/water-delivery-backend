services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water_delivery_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres
    environment:
      POSTGRES_DB: water_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "8090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin

  redis:
    image: redis:7
    container_name: water_delivery_redis
    ports:
      - "6380:6379"
volumes:
  postgres_data: